<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<script>
  // Применяем тему ДО рендера страницы — убирает мигание
  (function(){
    var t = localStorage.getItem('class5a_theme');
    if (t) {
      document.documentElement.setAttribute('data-theme', t);
    }
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="5 «А»">
<meta name="theme-color" content="#1a1a2e">
<title>5 «А» Класс</title>
<link rel="manifest" href="data:application/json;charset=utf-8,{
  &quot;name&quot;: &quot;5 «А» Класс&quot;,
  &quot;short_name&quot;: &quot;5 А&quot;,
  &quot;start_url&quot;: &quot;.&quot;,
  &quot;display&quot;: &quot;standalone&quot;,
  &quot;background_color&quot;: &quot;#1a1a2e&quot;,
  &quot;theme_color&quot;: &quot;#1a1a2e&quot;,
  &quot;orientation&quot;: &quot;portrait&quot;,
  &quot;icons&quot;: [{
    &quot;src&quot;: &quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text y='.9em' font-size='80' x='10'>📚</text></svg>&quot;,
    &quot;sizes&quot;: &quot;any&quot;,
    &quot;type&quot;: &quot;image/svg+xml&quot;
  }]
}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    /* backgrounds */
    --bg:           #1a1a2e;
    --card:         #22223b;
    --input-bg:     #0d0e1c;
    --auth-card-bg: #16172a;
    /* text */
    --text:         #f0eeff;
    --muted:        #a0a8c0;
    --placeholder:  #6068a0;
    --label:        #8890b8;
    /* borders */
    --border:       #32325a;
    --input-border: rgba(255,255,255,0.10);
    /* primary */
    --primary:      #7b8ff7;
    --primary-light:#2a2d4a;
    --primary-glow: rgba(123,143,247,0.20);
    /* tags */
    --admin-tag:        #b6f542;
    --admin-tag-text:   #2a4a00;
    --teacher-tag:      #ff4444;
    --teacher-tag-text: #fff;
    /* badges */
    --badge-question-bg:   #1e2550;
    --badge-question-text: #7b8ff7;
    --badge-answer-bg:     #0e2e1e;
    --badge-answer-text:   #4ade80;
    /* important card */
    --imp-bg:     linear-gradient(135deg,#2a2200,#22223b);
    --imp-border: #6a4e00;
    --imp-author: #ffd060;
    /* answer item */
    --answer-bg:     #1e2040;
    --answer-border: #7b8ff7;
    /* danger */
    --danger-bg:     #3a1a1a;
    --danger-text:   #ff7070;
    --danger-border: #5a2020;
    /* misc */
    --accent:   #ff6b9d;
    --shadow:   0 4px 24px rgba(0,0,0,0.25);
    --radius:   18px;
    --radius-sm:10px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }

/* LIGHT THEME */
:root[data-theme=“light”] {
–bg:           #f2f4f8;
–card:         #ffffff;
–input-bg:     #e8ecf5;
–auth-card-bg: #ffffff;
–text:         #1a1d2e;
–muted:        #7c84a3;
–placeholder:  #aab0c8;
–label:        #7c84a3;
–border:       #d8ddf0;
–input-border: #d0d5e8;
–primary:      #4f6ef7;
–primary-light:#eef0ff;
–primary-glow: rgba(79,110,247,0.15);
–badge-question-bg:   #e8f0ff;
–badge-question-text: #3a56e0;
–badge-answer-bg:     #edfff5;
–badge-answer-text:   #1a7a42;
–imp-bg:     linear-gradient(135deg,#fffbea,#ffffff);
–imp-border: #ffd060;
–imp-author: #a07000;
–answer-bg:     #eef0ff;
–answer-border: #4f6ef7;
–danger-bg:     #fff0f3;
–danger-text:   #e02020;
–danger-border: #ffd0d8;
–shadow:   0 4px 24px rgba(79,110,247,0.08);
}
[data-theme=“light”] .auth-card { border-color: var(–border); }

/* Smooth theme transitions */
.header, .nav, .card, .ask-form-card, .important-card,
.answer-item, .request-card, .profile-card, .important-form,
.nav-tab, .main, .section-title, .card-text, .card-author,
.form-group input, .form-group select, .form-group label,
.btn-logout, .btn-dismiss, .btn-theme, .answer-form input,
.photo-upload-btn, .answer-photo-upload, .empty-state {
transition: background var(–transition), color var(–transition),
border-color var(–transition), box-shadow var(–transition);
}
[data-theme=“light”] .toggle-box { background: #d0d5e8; }
[data-theme=“light”] .loading-overlay { background: rgba(242,244,248,0.92); color: var(–text); }
[data-theme=“light”] .toast { background: #1a1d2e; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

html {
min-height: 100%;
min-height: 100svh;
overflow-x: hidden;
margin: 0;
padding: 0;
}
body {
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100%;
min-height: 100svh;
overflow-x: hidden;
margin: 0;
padding: 0;
padding-top: env(safe-area-inset-top);
padding-bottom: env(safe-area-inset-bottom);
padding-left: env(safe-area-inset-left);
padding-right: env(safe-area-inset-right);
transition: background 0.25s, color 0.25s;
}

/* –– AUTH SCREEN –– */
#auth-screen {
min-height: 100svh;
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(160deg, #3a4fd4 0%, #7c5cbf 45%, #d4527a 100%);
position: fixed;
inset: 0;
overflow-y: auto;
z-index: 200;
}

#auth-screen::before {
content: ‘’;
position: absolute;
width: 600px; height: 600px;
background: rgba(255,255,255,0.07);
border-radius: 50%;
top: -150px; left: -150px;
}

#auth-screen::after {
content: ‘’;
position: absolute;
width: 400px; height: 400px;
background: rgba(255,255,255,0.06);
border-radius: 50%;
bottom: -100px; right: -100px;
}

.auth-card {
background: var(–auth-card-bg);
border-radius: 28px;
padding: 48px 44px 40px;
width: 100%;
max-width: 420px;
box-shadow: 0 20px 80px rgba(0,0,0,0.5);
position: relative;
z-index: 1;
animation: slideUp 0.5s cubic-bezier(.4,0,.2,1);
border: 1px solid var(–input-border);
}

@keyframes slideUp {
from { opacity:0; transform: translateY(40px); }
to { opacity:1; transform: translateY(0); }
}

.auth-logo {
text-align: center;
margin-bottom: 28px;
}

.auth-logo .emoji {
font-size: 52px;
display: block;
margin-bottom: 8px;
filter: drop-shadow(0 4px 8px rgba(79,110,247,0.3));
}

.auth-logo h1 {
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 28px;
font-weight: 800;
letter-spacing: -0.02em;
background: linear-gradient(90deg, #a78bfa, #f472b6);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.auth-logo p {
color: var(–label);
font-size: 14px;
margin-top: 6px;
font-weight: 400;
}

.form-group {
margin-bottom: 18px;
}

.form-group label {
display: block;
font-size: 12px;
font-weight: 700;
color: var(–label);
text-transform: uppercase;
letter-spacing: 0.08em;
margin-bottom: 8px;
}

.form-group input, .form-group select {
width: 100%;
padding: 13px 16px;
border: 1.5px solid var(–input-border);
border-radius: var(–radius-sm);
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 15px;
font-weight: 500;
color: var(–text);
background: var(–input-bg);
outline: none;
transition: border-color var(–transition), box-shadow var(–transition);
-webkit-appearance: none;
}

.form-group input::placeholder, .form-group select::placeholder {
color: var(–placeholder);
}

.form-group input:focus, .form-group select:focus {
border-color: var(–primary);
box-shadow: 0 0 0 3px var(–primary-glow);
background: var(–input-bg);
}

.btn-primary {
width: 100%;
padding: 14px;
background: linear-gradient(90deg, #4f6ef7, #818cf8);
color: #fff;
border: none;
border-radius: var(–radius-sm);
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 16px;
font-weight: 800;
cursor: pointer;
transition: transform var(–transition), box-shadow var(–transition), opacity var(–transition);
box-shadow: 0 4px 20px rgba(79,110,247,0.35);
margin-top: 8px;
letter-spacing: 0.02em;
}

.btn-primary:hover {
transform: translateY(-2px);
box-shadow: 0 8px 28px rgba(79,110,247,0.45);
}

.btn-primary:active { transform: translateY(0); }

.auth-error {
background: var(–danger-bg);
color: var(–danger-text);
border-radius: 8px;
padding: 10px 14px;
font-size: 13px;
font-weight: 600;
margin-top: 12px;
display: none;
border: 1.5px solid var(–danger-border);
}

/* –– MAIN APP –– */
#app {
display: none;
min-height: 100vh;
flex-direction: column;
}

/* HEADER */
.header {
background: var(–card);
border-bottom: 1.5px solid var(–border);
padding: 0 24px;
height: 62px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 100;
box-shadow: 0 2px 16px rgba(79,110,247,0.07);
}

.header-brand {
display: flex;
align-items: center;
gap: 10px;
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif; letter-spacing: -0.01em;
font-size: 20px;
font-weight: 700;
color: var(–primary);
}

.header-brand span { font-size: 26px; }

.header-user {
display: flex;
align-items: center;
gap: 10px;
}

.user-avatar {
width: 38px; height: 38px;
border-radius: 50%;
background: linear-gradient(135deg, #4f6ef7, #ff6b9d);
display: flex; align-items: center; justify-content: center;
color: #fff;
font-weight: 800;
font-size: 16px;
flex-shrink: 0;
}

.user-info {
display: flex;
flex-direction: column;
align-items: flex-end;
}

.user-name {
font-weight: 700;
font-size: 14px;
line-height: 1.2;
display: flex;
align-items: center;
gap: 6px;
}

.tag {
display: inline-block;
padding: 2px 9px;
border-radius: 20px;
font-size: 10px;
font-weight: 800;
letter-spacing: 0.04em;
text-transform: uppercase;
}

.tag-creator {
background: var(–admin-tag);
color: var(–admin-tag-text);
}
.tag-admin {
background: var(–admin-tag);
color: var(–admin-tag-text);
}

.tag-teacher {
background: var(–teacher-tag);
color: var(–teacher-tag-text);
}

.btn-logout {
background: var(–bg);
border: 1.5px solid var(–border);
border-radius: 8px;
padding: 6px 12px;
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 12px;
font-weight: 700;
color: var(–muted);
cursor: pointer;
transition: all var(–transition);
}

.btn-logout:hover { background: var(–danger-bg); color: var(–danger-text); border-color: #5a2020; }

.btn-theme {
width: 36px; height: 36px;
background: var(–bg);
border: 1.5px solid var(–border);
border-radius: 50%;
font-size: 17px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all var(–transition);
flex-shrink: 0;
}
.btn-theme:hover { border-color: var(–primary); transform: rotate(20deg); }

/* NAV TABS */
.nav {
background: var(–card);
padding: 0 24px;
display: flex;
gap: 4px;
border-bottom: 1.5px solid var(–border);
overflow-x: auto;
scrollbar-width: none;
}

.nav::-webkit-scrollbar { display: none; }

.nav-tab {
padding: 14px 18px 12px;
font-size: 14px;
font-weight: 700;
color: var(–muted);
cursor: pointer;
border-bottom: 3px solid transparent;
white-space: nowrap;
transition: color var(–transition), border-color var(–transition);
position: relative;
display: flex;
align-items: center;
gap: 6px;
}

.nav-tab:hover { color: var(–primary); }

.nav-tab.active {
color: var(–primary);
border-bottom-color: var(–primary);
}

.badge {
background: var(–accent);
color: #fff;
border-radius: 20px;
font-size: 10px;
font-weight: 800;
padding: 1px 7px;
min-width: 18px;
text-align: center;
}

/* MAIN CONTENT */
.main {
padding: 28px 24px 60px;
max-width: 760px;
margin: 0 auto;
width: 100%;
flex: 1;
background: var(–bg);
}

.tab-panel { display: none; animation: fadeIn 0.25s ease; }
.tab-panel.active { display: block; }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* SECTION TITLE */
.section-title {
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif; letter-spacing: -0.01em;
font-size: 22px;
font-weight: 700;
color: var(–text);
margin-bottom: 20px;
display: flex;
align-items: center;
gap: 10px;
}

.section-title .icon { font-size: 26px; }

/* CARDS */
.card {
background: var(–card);
border-radius: var(–radius);
padding: 20px 22px;
margin-bottom: 14px;
box-shadow: var(–shadow);
border: 1.5px solid var(–border);
transition: transform var(–transition), box-shadow var(–transition);
}

.card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(79,110,247,0.13); }

.card-meta {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 10px;
flex-wrap: wrap;
}

.card-avatar {
width: 32px; height: 32px;
border-radius: 50%;
background: linear-gradient(135deg, #818cf8, #a78bfa);
display: flex; align-items: center; justify-content: center;
color: #fff;
font-weight: 800;
font-size: 13px;
flex-shrink: 0;
}

.card-author {
font-weight: 700;
font-size: 14px;
display: flex;
align-items: center;
gap: 6px;
}

.card-time {
color: var(–muted);
font-size: 12px;
margin-left: auto;
}

.card-text {
font-size: 15px;
line-height: 1.6;
color: var(–text);
margin-bottom: 12px;
}

/* ANSWER SECTION */
.answers-section { margin-top: 12px; padding-top: 12px; border-top: 1.5px dashed var(–border); }

.answer-item {
background: var(–primary-light);
border-radius: 12px;
padding: 12px 14px;
margin-bottom: 8px;
border-left: 4px solid var(–answer-border);
}

.answer-author {
font-size: 12px;
font-weight: 700;
color: var(–primary);
margin-bottom: 4px;
display: flex;
align-items: center;
gap: 5px;
}

.answer-text {
font-size: 14px;
line-height: 1.5;
color: var(–text);
}

.answer-form {
margin-top: 10px;
display: flex;
gap: 8px;
}

.answer-form input {
flex: 1;
padding: 10px 14px;
border: 1.5px solid var(–border);
border-radius: 10px;
font-family: ‘Inter’, -apple-system, sans-serif;
font-size: 14px;
font-weight: 500;
color: var(–text);
background: var(–input-bg);
outline: none;
transition: border-color var(–transition), background var(–transition), color var(–transition);
-webkit-appearance: none;
}

.answer-form input:focus { border-color: var(–primary); background: var(–input-bg); box-shadow: 0 0 0 3px var(–primary-glow); }

.btn-answer {
padding: 10px 16px;
background: var(–primary);
color: #fff;
border: none;
border-radius: 10px;
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 13px;
font-weight: 800;
cursor: pointer;
transition: background var(–transition), transform var(–transition);
white-space: nowrap;
}

.btn-answer:hover { background: var(–primary); filter: brightness(0.85); transform: scale(1.04); }

/* ASK FORM */
.ask-form-card {
background: var(–card);
border-radius: var(–radius);
padding: 28px 26px;
box-shadow: var(–shadow);
border: 1.5px solid var(–border);
}

.ask-form-card textarea {
width: 100%;
padding: 14px 16px;
border: 2px solid var(–border);
border-radius: 12px;
font-family: ‘Inter’, -apple-system, sans-serif;
font-size: 15px;
font-weight: 500;
color: var(–text);
background: var(–input-bg);
resize: vertical;
min-height: 120px;
outline: none;
transition: border-color var(–transition), background var(–transition), color var(–transition);
line-height: 1.6;
margin-bottom: 14px;
-webkit-appearance: none;
}
.ask-form-card textarea::placeholder { color: var(–placeholder); }
.ask-form-card textarea:focus { border-color: var(–primary); box-shadow: 0 0 0 3px var(–primary-glow); background: var(–input-bg); }

.btn-send {
padding: 13px 28px;
background: linear-gradient(90deg, #4f6ef7, #818cf8);
color: #fff;
border: none;
border-radius: 10px;
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 15px;
font-weight: 800;
cursor: pointer;
transition: transform var(–transition), box-shadow var(–transition);
box-shadow: 0 4px 16px rgba(79,110,247,0.3);
}

.btn-send:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,110,247,0.4); }

/* IMPORTANT SECTION */
.important-card {
background: var(–imp-bg);
border: 2px solid var(–imp-border);
border-radius: var(–radius);
padding: 20px 22px;
margin-bottom: 14px;
box-shadow: 0 4px 20px rgba(255,204,0,0.12);
position: relative;
overflow: hidden;
}

.important-card::before {
content: ‘⚡’;
position: absolute;
right: 16px;
top: 14px;
font-size: 28px;
opacity: 0.18;
}

.important-card .card-text { font-size: 15px; color: var(–text); }

.important-card .card-author { color: var(–imp-author); }

.important-form {
background: var(–card);
border-radius: var(–radius);
padding: 24px;
box-shadow: var(–shadow);
border: 1.5px solid var(–border);
margin-top: 20px;
}

.important-form h3 {
font-size: 16px;
font-weight: 800;
margin-bottom: 14px;
color: var(–text);
}

/* REQUESTS TAB */
.request-card {
background: var(–card);
border-radius: var(–radius);
padding: 18px 20px;
margin-bottom: 12px;
box-shadow: var(–shadow);
border: 1.5px solid var(–border);
}

.request-card .request-type {
display: inline-block;
padding: 3px 10px;
border-radius: 20px;
font-size: 11px;
font-weight: 800;
text-transform: uppercase;
letter-spacing: 0.04em;
margin-bottom: 8px;
}

.type-question { background: var(–badge-question-bg); color: var(–badge-question-text); }
.type-answer { background: var(–badge-answer-bg); color: var(–badge-answer-text); }

.request-actions {
display: flex;
gap: 8px;
margin-top: 12px;
flex-wrap: wrap;
}

.btn-promote {
padding: 8px 16px;
background: linear-gradient(90deg, #ffcc00, #ffaa00);
color: #3a2800;
border: none;
border-radius: 8px;
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 13px;
font-weight: 800;
cursor: pointer;
transition: transform var(–transition);
box-shadow: 0 2px 10px rgba(255,200,0,0.3);
}

.btn-promote:hover { transform: scale(1.04); }

.btn-dismiss {
padding: 8px 14px;
background: var(–bg);
border: 1.5px solid var(–border);
border-radius: 8px;
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 13px;
font-weight: 700;
color: var(–muted);
cursor: pointer;
transition: all var(–transition);
}

.btn-dismiss:hover { background: var(–danger-bg); color: var(–danger-text); border-color: #5a2020; }

/* PHOTO UPLOAD */
.photo-upload-area {
margin-bottom: 14px;
}

.photo-upload-btn {
display: inline-flex;
align-items: center;
gap: 7px;
padding: 9px 16px;
background: var(–input-bg);
border: 2px dashed var(–border);
border-radius: 10px;
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
font-size: 13px;
font-weight: 700;
color: var(–muted);
cursor: pointer;
transition: all var(–transition);
}

.photo-upload-btn:hover {
border-color: var(–primary);
color: var(–primary);
background: var(–primary-light);
}

.photo-upload-btn input { display: none; }

.photo-previews {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-top: 10px;
}

.photo-preview-wrap {
position: relative;
width: 80px;
height: 80px;
border-radius: 10px;
overflow: hidden;
border: 2px solid var(–border);
flex-shrink: 0;
}

.photo-preview-wrap img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
}

.photo-remove {
position: absolute;
top: 3px; right: 3px;
width: 20px; height: 20px;
background: rgba(0,0,0,0.65);
color: #fff;
border: none;
border-radius: 50%;
font-size: 11px;
cursor: pointer;
display: flex;

// ============================
// CRYPTO
// ============================
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const BIN_KEY = '$2a$10$nOBnP/FXGXqRLbP0p3epne7xLCwGuOzzIRRKIfjTv8GPlFSl.ZJNG';

function binHeaders(write = false) {
  const h = { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY };
  if (!write) h['X-Bin-Meta'] = 'false';
  return h;
}

async function loadData() {
  showLoadingOverlay(true);
  try {
    if (BIN_ID) {
      const res = await fetch(`${BIN_URL_BASE}/${BIN_ID}/latest`, { headers: binHeaders() });
      const data = await res.json();
      // Берём пользователей из бина; если бин пустой — используем пресет
      USERS = (data.users && data.users.length) ? data.users : DEFAULT_USERS.map(u => ({...u}));
      questions = data.questions || [];
      importantPosts = data.importantPosts || [];
      requests = data.requests || [];
      nextQuestionId = data.meta?.nextQ || (questions.length ? Math.max(...questions.map(q=>q.id))+1 : 1);
      nextImportantId = data.meta?.nextI || (importantPosts.length ? Math.max(...importantPosts.map(p=>p.id))+1 : 1);
      nextRequestId = data.meta?.nextR || (requests.length ? Math.max(...requests.map(r=>r.id))+1 : 1);
    } else {
      // Бин ещё не создан — используем пресет локально
      USERS = DEFAULT_USERS.map(u => ({...u}));
    }
  } catch(e) {
    showToast('Ошибка загрузки данных 😢');
    if (!USERS.length) USERS = DEFAULT_USERS.map(u => ({...u}));
  }
  showLoadingOverlay(false);
}

// ── Очередь сохранений: debounce 600ms + 3 попытки ──────────────────────────
let _saveTimer = null;
let _saving = false;
let _pendingSave = false;

function saveData() {
  // debounce — откладываем на 600ms, чтобы не спамить при быстрых действиях
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_flushSave, 600);
}

async function _flushSave() {
  if (_saving) { _pendingSave = true; return; }
  if (!BIN_ID) return;
  _saving = true;
  _pendingSave = false;

  const body = JSON.stringify({
    users: USERS, questions, importantPosts, requests,
    meta: { nextQ: nextQuestionId, nextI: nextImportantId, nextR: nextRequestId }
  });

  for (let attempt = 1; attempt <= 4; attempt++) {
    try {
      const res = await fetch(`${BIN_URL_BASE}/${BIN_ID}`, {
        method: 'PUT',
        headers: binHeaders(true),
        body
      });
      if (res.ok) { _saving = false; if (_pendingSave) _flushSave(); return; }
      if (res.status === 429) {
        await new Promise(r => setTimeout(r, 2000 * attempt)); // rate-limit
        continue;
      }
      // другая ошибка — ждём и повторяем
      await new Promise(r => setTimeout(r, 1000 * attempt));
    } catch(e) {
      await new Promise(r => setTimeout(r, 1000 * attempt));
    }
  }
  _saving = false;
  showToast('Не удалось сохранить, проверьте интернет 😢');
}

const photoState = {

  'imp': [],

// per-answer photo state: key = qId
const answerPhotoState = {};

function handlePhotoSelect(inputId, previewId) {
  const stateKey = inputId === 'ask-photos' ? 'ask' : 'imp';
  const input = document.getElementById(inputId);
  const files = Array.from(input.files);
  const current = photoState[stateKey];
  const remaining = 3 - current.length;
  const toAdd = files.slice(0, remaining);

  toAdd.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      current.push(e.target.result);
      renderPreviews(stateKey, previewId);
    };
    reader.readAsDataURL(file);
  });

  if (files.length > remaining) showToast(`Максимум 3 фото!`);
  input.value = '';
}

function renderPreviews(stateKey, previewId) {
  const container = document.getElementById(previewId);
  if (!container) return;
  container.innerHTML = photoState[stateKey].map((src, i) => `
    <div class="photo-preview-wrap">
      <img src="${src}" alt="">
      <button class="photo-remove" onclick="removePhoto('${stateKey}','${previewId}',${i})">✕</button>
    </div>
  `).join('');
}

function removePhoto(stateKey, previewId, index) {
  photoState[stateKey].splice(index, 1);
  renderPreviews(stateKey, previewId);
}

// Answer photo handlers
function handleAnswerPhotoSelect(inputEl, qId) {
  if (!answerPhotoState[qId]) answerPhotoState[qId] = [];
  const files = Array.from(inputEl.files);
  const current = answerPhotoState[qId];
  const remaining = 3 - current.length;
  const toAdd = files.slice(0, remaining);

  toAdd.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      current.push(e.target.result);
      renderAnswerPreviews(qId);
    };
    reader.readAsDataURL(file);
  });

  if (files.length > remaining) showToast('Максимум 3 фото!');
  inputEl.value = '';
}

function renderAnswerPreviews(qId) {

function roleLabel(r) {
  if (r === 'creator') return 'Создатель';
  if (r === 'admin')   return 'Администратор';
  if (r === 'teacher') return 'Классный руководитель';
  return 'Ученик';
}

function getInitials(name) {
  return name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0, 2).join('');
}

function renderUserList() {
  const list = document.getElementById('user-list');
  const gradients = ['135deg,#4f6ef7,#a78bfa', '135deg,#f472b6,#ff6b9d', '135deg,#34d399,#059669', '135deg,#f59e0b,#ef4444', '135deg,#06b6d4,#3b82f6'];

  if (!USERS.length) {
    list.innerHTML = '<div class="user-list-empty">Аккаунтов пока нет.<br>Нажмите «+ Добавить аккаунт»</div>';
    return;
  }

  list.innerHTML = USERS.map((u, i) => {
    const avatarContent = u.avatar ? `<img src="${u.avatar}">` : (u.initials || getInitials(u.name));
    const grad = gradients[i % gradients.length];
    return `
      <div class="user-list-item" onclick="selectUser('${u.id}')">
        <div class="user-list-avatar" style="background:linear-gradient(${grad})">${avatarContent}</div>
        <div class="user-list-info">
          <div class="user-list-name">${u.name}</div>
          <div class="user-list-role">${roleLabel(u.role)}</div>
        </div>
        <div class="user-list-chevron">›</div>
      </div>`;
  }).join('');
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const pwd  = document.getElementById('reg-password').value;
  const pwd2 = document.getElementById('reg-password2').value;
  const roleEl = document.querySelector('.role-option.selected');
  const role = roleEl ? roleEl.dataset.role : 'pupil';

  const errEl = document.getElementById('auth-error-reg');
  const showRegError = msg => { errEl.textContent = msg; errEl.style.display = 'block'; };

  if (!name) { showRegError('Введите имя и фамилию!'); return; }
  if (name.length < 2) { showRegError('Имя слишком короткое.'); return; }
  if (!pwd) { showRegError('Придумайте пароль!'); return; }
  if (pwd.length < 4) { showRegError('Пароль минимум 4 символа.'); return; }
  if (pwd !== pwd2) { showRegError('Пароли не совпадают!'); return; }
  if (role === 'creator') { showRegError('Нельзя создать аккаунт с этой ролью.'); return; }

  // Проверяем дубликат имени
  if (USERS.find(u => u.name.toLowerCase() === name.toLowerCase())) {
    showRegError('Пользователь с таким именем уже есть.'); return;
  }

  showLoadingOverlay(true);

  // Если BIN ещё не создан — создаём
  if (!BIN_ID) {
    try {
      const res = await fetch(BIN_URL_BASE, {
        method: 'POST',
        headers: { ...binHeaders(true), 'X-Bin-Name': 'class5a', 'X-Bin-Private': 'true' },
        body: JSON.stringify({ users: [], questions: [], importantPosts: [], requests: [], meta: { nextQ:1, nextI:1, nextR:1 } })
      });
      const data = await res.json();
      BIN_ID = data.metadata.id;
      localStorage.setItem('class5a_bin_id', BIN_ID);
    } catch(e) {
      showLoadingOverlay(false);
      showRegError('Ошибка сети. Попробуйте ещё раз.');
      return;
    }
  }

  const hash = await sha256(pwd);
  const newUser = {
    id: 'u_' + Date.now(),
    name,
    role,
    initials: getInitials(name),
    passwordHash: hash,
    avatar: null
  };

  USERS.push(newUser);
  saveData();

  showLoadingOverlay(false);
  showToast(`Аккаунт создан! Добро пожаловать, ${name.split(' ')[0]} 🎉`);

  // Сразу входим
  currentUser = { ...newUser };
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}

async function doLogin() {
  const password = document.getElementById('login-password').value;
  if (!selectedUserId) return;
  if (!password) { showError('Введите пароль!'); return; }

  showLoadingOverlay(true);

  // Перезагружаем USERS на случай если другой пользователь зарегистрировался
  if (BIN_ID) {
    try {
      const res = await fetch(`${BIN_URL_BASE}/${BIN_ID}/latest`, { headers: binHeaders() });
      const data = await res.json();
      if (data.users && data.users.length) USERS = data.users;
    } catch(e) {}
  }

  const hash = await sha256(password);
  const user = USERS.find(u => u.id === selectedUserId);
  showLoadingOverlay(false);

  if (!user || user.passwordHash !== hash) {
    showError('Неверный пароль. Попробуйте ещё раз!');
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
    return;
  }

  currentUser = { ...user };
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

  currentUser = null;
  selectedUserId = null;
  document.getElementById('tab-requests').style.display = 'none';
  document.getElementById('important-form-section').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('auth-error').style.display = 'none';
  goBackToStep1();
}

// ============================
// INIT APP
// ============================
async function initApp() {
  updateHeaderAvatar();
  const nameEl = document.getElementById('header-name');
  nameEl.innerHTML = currentUser.name + ' ' + renderTagInline(currentUser.role);
  // Обновляем кнопку темы (она рендерится только после входа)
  applyTheme(document.body.getAttribute('data-theme') === 'light');

  if (currentUser.role === 'admin' || currentUser.role === 'creator') {
    document.getElementById('tab-requests').style.display = 'flex';
  }
  if (currentUser.role === 'admin' || currentUser.role === 'creator' || currentUser.role === 'teacher') {
    document.getElementById('important-form-section').style.display = 'block';
  }

  await loadData();
  // Обновляем currentUser из свежих данных (могли поменяться аватарка/пароль)
  const fresh = USERS.find(u => u.id === currentUser.id);
  if (fresh) currentUser = { ...fresh };
  updateHeaderAvatar();
  switchTab('questions');
  updateRequestsBadge();
}

function updateHeaderAvatar() {
  const el = document.getElementById('header-avatar');
  if (currentUser.avatar) {
    el.innerHTML = `<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    el.textContent = currentUser.initials;
  }
}

function renderTagInline(role) {
  if (role === 'creator') return '<span class="tag tag-creator">Админ</span>';
  if (role === 'admin')   return '<span class="tag tag-admin">Админ</span>';
  if (role === 'teacher') return '<span class="tag tag-teacher">Классный руководитель</span>';
  return '';
}

// ============================
// TABS
// ============================
function switchTab(name) {
  if (name === 'requests' && currentUser.role !== 'admin' && currentUser.role !== 'creator') return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const tab = document.querySelector(`.nav-tab[data-tab="${name}"]`);
  if (tab) tab.classList.add('active');
  const panel = document.getElementById(`panel-${name}`);
  if (panel) panel.classList.add('active');

  if (name === 'questions') renderQuestions();
  if (name === 'important') renderImportant();
  if (name === 'requests') renderRequests();
  if (name === 'profile') renderProfile();
}

// ============================
// PROFILE
// ============================
function renderProfile() {
  const av = document.getElementById('profile-avatar-display');
  if (currentUser.avatar) {
    av.innerHTML = `<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    av.textContent = currentUser.initials;
  }
  document.getElementById('profile-fullname').textContent = currentUser.name;
  document.getElementById('profile-role-tag').innerHTML = renderTagInline(currentUser.role) || '<span style="color:var(--muted);font-size:13px;font-weight:600;">Ученик</span>';
  // Очищаем поля пароля
  ['pwd-current','pwd-new','pwd-confirm'].forEach(id => document.getElementById(id).value = '');

  // Управление ролями — только creator
  const mgmtSection = document.getElementById('role-management-section');
  if (currentUser.role === 'creator') {
    mgmtSection.style.display = 'block';
    renderRoleManagement();
  } else {
    mgmtSection.style.display = 'none';
  }
}

function renderRoleManagement() {
  const list = document.getElementById('role-management-list');
  // Все кроме самого создателя
  const others = USERS.filter(u => u.id !== currentUser.id);
  if (!others.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:8px 0;">Пока нет других пользователей.</div>';
    return;
  }
  list.innerHTML = others.map(u => {
    const isAdmin = u.role === 'admin';
    const initials = u.initials || getInitials(u.name);
    const btn = isAdmin
      ? `<button class="role-mgmt-btn demote" onclick="setUserRole('${u.id}', 'pupil')">− Убрать админа</button>`
      : `<button class="role-mgmt-btn promote" onclick="setUserRole('${u.id}', 'admin')">+ Сделать админом</button>`;
    return `
      <div class="role-mgmt-row">
        <div class="role-mgmt-avatar">${initials}</div>
        <div class="role-mgmt-name">${u.name} ${renderTagInline(u.role)}</div>
        ${btn}
      </div>`;
  }).join('');
}

function setUserRole(userId, newRole) {
  const user = USERS.find(u => u.id === userId);
  if (!user) return;
  // Нельзя менять роль creator
  if (user.role === 'creator') { showToast('Нельзя изменить роль создателя.'); return; }
  user.role = newRole;
  saveData();
  showToast(newRole === 'admin'
    ? `${user.name.split(' ')[0]} теперь админ ⚙️`
    : `${user.name.split(' ')[0]} больше не админ`);
  renderRoleManagement();
}

async function handleAvatarUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const dataUrl = e.target.result;
    // Обновляем в USERS и currentUser
    const idx = USERS.findIndex(u => u.id === currentUser.id);
    if (idx !== -1) USERS[idx].avatar = dataUrl;
    currentUser.avatar = dataUrl;
    renderProfile();
    updateHeaderAvatar();
    saveData();
    showToast('Аватарка обновлена! 🖼️');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

async function changePassword() {
  const current = document.getElementById('pwd-current').value;
  const newPwd = document.getElementById('pwd-new').value;
  const confirm = document.getElementById('pwd-confirm').value;

  if (!current || !newPwd || !confirm) { showToast('Заполните все поля! 📝'); return; }
  if (newPwd !== confirm) { showToast('Новые пароли не совпадают! ❌'); return; }
  if (newPwd.length < 4) { showToast('Пароль минимум 4 символа!'); return; }

  const currentHash = await sha256(current);
  const user = USERS.find(u => u.id === currentUser.id);
  if (!user || user.passwordHash !== currentHash) {
    showToast('Текущий пароль неверный! ❌');
    return;
  }

  const newHash = await sha256(newPwd);
  const idx = USERS.findIndex(u => u.id === currentUser.id);
  if (idx !== -1) USERS[idx].passwordHash = newHash;
  currentUser.passwordHash = newHash;

  ['pwd-current','pwd-new','pwd-confirm'].forEach(id => document.getElementById(id).value = '');
  saveData();
  showToast('Пароль успешно изменён! 🔒');
}

// ============================
// QUESTIONS
// ============================
function renderQuestions() {
  const list = document.getElementById('questions-list');
  if (!questions.length) {
    list.innerHTML = `<div class="empty-state"><span class="em">🤔</span><p>Пока вопросов нет. Задайте первый!</p></div>`;
    return;
  }
  list.innerHTML = questions.map(q => renderQuestionCard(q)).join('');
}

function renderQuestionCard(q) {
  const answers = q.answers.map(a => `
    <div class="answer-item">
      <div class="answer-author">
        ${(()=>{const au=USERS.find(u=>u.id===a.authorId);return au?.avatar?`<img src="${au.avatar}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;margin-right:4px;">`:''})()}
        ${a.authorName} ${renderTagInline(a.role)} <span style="color:var(--muted);font-weight:600;font-size:11px;margin-left:auto;">${a.time}</span>
      </div>
      <div class="answer-text">${escHtml(a.text)}</div>
      ${a.photos && a.photos.length ? `<div class="answer-photos">${a.photos.map(src=>`<img src="${src}" onclick="openLightbox('${src}')">`).join('')}</div>` : ''}
    </div>
  `).join('');

  const answerForm = `
    <div class="answer-form" style="flex-direction:column;gap:8px;">
      <div style="display:flex;gap:8px;">
        <input type="text" id="ans-input-${q.id}" placeholder="Написать ответ..." onkeydown="if(event.key==='Enter')submitAnswer(${q.id})" style="flex:1;">
        <button class="btn-answer" onclick="submitAnswer(${q.id})">Ответить</button>
      </div>
      <label class="answer-photo-upload">
        <input type="file" accept="image/*" multiple onchange="handleAnswerPhotoSelect(this,${q.id})">
        📷 Фото к ответу
      </label>
      <div class="photo-previews" id="ans-photo-preview-${q.id}"></div>
    </div>
  `;

  const qAuthor = USERS.find(u => u.id === q.authorId);
  const qAvatarContent = q.anonymous ? '?' : (qAuthor?.avatar ? `<img src="${qAuthor.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : q.authorName[0]);
  const qAvatarBg = q.anonymous ? 'linear-gradient(135deg,#aaa,#ccc)' : 'linear-gradient(135deg,#818cf8,#a78bfa)';
  return `
    <div class="card" id="q-card-${q.id}">
      <div class="card-meta">
        <div class="card-avatar" style="background:${qAvatarBg}">${qAvatarContent}</div>
        <div class="card-author">${q.anonymous ? '<span style="color:var(--muted)">Аноним</span>' : escHtml(q.authorName)}</div>
        <span class="card-time">${q.time}</span>
      </div>
      <div class="card-text">${escHtml(q.text)}</div>
      ${renderPhotoGallery(q.photos)}
      <div class="answers-section">
        <div id="answers-${q.id}">${answers}</div>
        ${answerForm}
      </div>
    </div>
  `;
}

async function submitAnswer(qId) {
  const inp = document.getElementById(`ans-input-${qId}`);
  const text = inp.value.trim();
  const photos = answerPhotoState[qId] || [];
  if (!text && !photos.length) return;

  const q = questions.find(x => x.id === qId);
  if (!q) return;

  const now = timeNow();
  const answer = {
    authorId: currentUser.id,
    authorName: currentUser.name,
    role: currentUser.role,
    text: text || '', photos: [...photos], time: now
  };
  q.answers.push(answer);
  answerPhotoState[qId] = [];

  addRequest('answer', qId, `Ответ на: "${q.text.substring(0,50)}..." — ${text.substring(0,50)}`, currentUser.name, now);

  inp.value = '';
  renderQuestions();
  updateRequestsBadge();
  saveData();
  showToast('Ответ отправлен! ✅');
}

// ============================
// ASK A QUESTION
// ============================
async function submitQuestion() {
  const text = document.getElementById('ask-text').value.trim();
  const anon = document.getElementById('anon-toggle').checked;
  const photos = [...photoState['ask']];
  if (!text && !photos.length) { showToast('Напишите вопрос или прикрепите фото! 📝'); return; }

  const now = timeNow();
  const q = {
    id: nextQuestionId++,
    authorId: anon ? null : currentUser.id,
    authorName: anon ? 'Аноним' : currentUser.name,
    anonymous: anon,
    text, photos, time: now, answers: []
  };
  questions.unshift(q);
  photoState['ask'] = [];
  document.getElementById('ask-previews').innerHTML = '';

  addRequest('question', q.id, text || '📷 Фото', anon ? 'Аноним' : currentUser.name, now);
  updateRequestsBadge();

  document.getElementById('ask-text').value = '';
  document.getElementById('anon-toggle').checked = false;
  saveData();
  showToast('Вопрос отправлен! 🚀');
  switchTab('questions');
}

// ============================
// IMPORTANT
// ============================
function renderImportant() {
  const list = document.getElementById('important-list');
  if (!importantPosts.length) {
    list.innerHTML = `<div class="empty-state"><span class="em">📭</span><p>Важных объявлений пока нет.</p></div>`;
    return;
  }
  list.innerHTML = importantPosts.map(p => `
    <div class="important-card">
      <div class="card-meta">
        <div class="card-avatar" style="background:linear-gradient(135deg,#ffcc00,#ff9800)">${p.authorName[0]}</div>
        <div class="card-author">${escHtml(p.authorName)} ${renderTagInline(p.role)}</div>
        <span class="card-time">${p.time}</span>
      </div>
      <div class="card-text">${escHtml(p.text)}</div>
      ${renderPhotoGallery(p.photos)}
    </div>
  `).join('');
}

async function postImportant() {
  const text = document.getElementById('important-text').value.trim();
  const photos = [...photoState['imp']];
  if (!text && !photos.length) { showToast('Введите текст или прикрепите фото! 📝'); return; }

  const post = {
    id: nextImportantId++,
    authorId: currentUser.id,
    authorName: currentUser.name,
    role: currentUser.role,
    text: text || '',
    photos,
    time: timeNow()
  };
  importantPosts.unshift(post);
  photoState['imp'] = [];
  document.getElementById('imp-previews').innerHTML = '';
  document.getElementById('important-text').value = '';
  renderImportant();
  saveData();
  showToast('Объявление опубликовано! ⚡');
}

// ============================
// REQUESTS (admin)
// ============================
function addRequest(type, refId, preview, authorName, time) {
  requests.unshift({ id: nextRequestId++, type, refId, preview, authorName, time, dismissed: false });
}

function updateRequestsBadge() {
  const active = requests.filter(r => !r.dismissed).length;
  const badge = document.getElementById('requests-badge');
  if (badge) badge.textContent = active;
}

function renderRequests() {
  const list = document.getElementById('requests-list');
  const active = requests.filter(r => !r.dismissed);
  if (!active.length) {
    list.innerHTML = `<div class="empty-state"><span class="em">📭</span><p>Новых запросов нет.</p></div>`;
    return;
  }
  list.innerHTML = active.map(r => `
    <div class="request-card" id="req-${r.id}">
      <span class="request-type ${r.type === 'question' ? 'type-question' : 'type-answer'}">${r.type === 'question' ? '❓ Вопрос' : '💬 Ответ'}</span>
      <div class="card-meta" style="margin-bottom:8px;">
        <div class="card-author">${escHtml(r.authorName)}</div>
        <span class="card-time">${r.time}</span>
      </div>
      <div class="card-text" style="font-size:14px;">${escHtml(r.preview.substring(0,120))}${r.preview.length > 120 ? '…' : ''}</div>
      <div class="request-actions">
        <button class="btn-promote" onclick="promoteToImportant(${r.id})">⚡ В «Важное»</button>
        <button class="btn-dismiss" onclick="dismissRequest(${r.id})">Отклонить</button>
      </div>
    </div>
  `).join('');
}

async function promoteToImportant(reqId) {
  const r = requests.find(x => x.id === reqId);
  if (!r) return;
  r.dismissed = true;

  const post = {
    id: nextImportantId++,
    authorId: currentUser.id,
    authorName: currentUser.name,
    role: currentUser.role,
    text: '🔁 ' + r.preview,
    time: timeNow()
  };
  importantPosts.unshift(post);
  updateRequestsBadge();
  renderRequests();
  saveData();
  showToast('Перенесено в «Важное»! ⚡');
}

async function dismissRequest(reqId) {
  const r = requests.find(x => x.id === reqId);
  if (r) r.dismissed = true;
  updateRequestsBadge();
  renderRequests();
  saveData();
  showToast('Запрос отклонён');
}

// ============================
// HELPERS
// ============================
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeNow() {
  const d = new Date();
  return d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }) + ', ' +
    d.getDate() + ' ' + ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Enter для входа
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Init select
populateLogin();

// ============================
// THEME
// ============================
function applyTheme(isLight) {
  document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = isLight ? '☀️' : '🌙';
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = isLight ? '#f2f4f8' : '#1a1a2e';
}

function toggleTheme() {
  const isLight = document.body.getAttribute('data-theme') !== 'light';
  localStorage.setItem('class5a_theme', isLight ? 'light' : 'dark');
  applyTheme(isLight);
}

// Apply saved theme immediately on script load (before paint)
(function() {
  const saved = localStorage.getItem('class5a_theme');
  applyTheme(saved === 'light');
})();

// ============================
// PWA SERVICE WORKER
// ============================
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'class5a-v1';
    const ASSETS = [location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('jsonbin.io') || e.request.url.includes('fonts.googleapis')) return;
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
